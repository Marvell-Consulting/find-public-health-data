# Local development services. Not for production.
#
# `docker compose up` starts only the database; the four app services sit behind
# profiles matching their names, so they start only when asked for:
#   docker compose --profile public-api --profile public-web up -d --build
# scripts/dev.sh derives the profile set from whichever apps you run locally.
#
# One wiring rule keeps every local/container mix working: each app, local or
# containerised, is reachable on the host at its canonical port (3000/3001/4000/4001),
# and any URL by which one app reaches another is env-driven with a localhost default.
# A containerised app overrides such URLs with host.docker.internal:<port>, reaching
# whatever runs behind that port without knowing whether it's local or a container.
services:
  db:
    image: postgres:18.4
    container_name: fphd-postgres
    restart: unless-stopped
    environment:
      # Passwords have no default: a missing one fails the command rather than silently
      # creating a role with a well-known password. Copy .env.example to .env to get started.
      POSTGRES_USER: ${POSTGRES_USER:-fphd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-fphd}
      # Passed through to the role-bootstrap init script (docker/postgres/initdb).
      PUBLIC_API_PASSWORD: ${PUBLIC_API_PASSWORD:?set PUBLIC_API_PASSWORD in .env (see .env.example)}
      INTERNAL_API_PASSWORD: ${INTERNAL_API_PASSWORD:?set INTERNAL_API_PASSWORD in .env (see .env.example)}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      # Postgres 18+ images store data in a version-specific subdirectory, so the
      # volume mounts at /var/lib/postgresql (not the pre-18 /var/lib/postgresql/data).
      - fphd-pgdata:/var/lib/postgresql
      # Role/grant bootstrap — runs once on first init (empty volume).
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fphd} -d ${POSTGRES_DB:-fphd}']
      interval: 5s
      timeout: 5s
      retries: 5

  public-web:
    profiles: [public-web]
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      args:
        APP: public-web
    container_name: fphd-public-web
    init: true
    ports:
      - '3000:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/healthcheck').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  internal-web:
    profiles: [internal-web]
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      args:
        APP: internal-web
    container_name: fphd-internal-web
    init: true
    ports:
      - '3001:3001'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/healthcheck').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  public-api:
    profiles: [public-api]
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      args:
        APP: public-api
    container_name: fphd-public-api
    init: true
    environment:
      DB_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-fphd}
      PUBLIC_API_PASSWORD: ${PUBLIC_API_PASSWORD:?set PUBLIC_API_PASSWORD in .env (see .env.example)}
    ports:
      - '4000:4000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/health').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  internal-api:
    profiles: [internal-api]
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      args:
        APP: internal-api
    container_name: fphd-internal-api
    init: true
    environment:
      DB_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-fphd}
      INTERNAL_API_PASSWORD: ${INTERNAL_API_PASSWORD:?set INTERNAL_API_PASSWORD in .env (see .env.example)}
    ports:
      - '4001:4001'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4001/health').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fphd-pgdata:
